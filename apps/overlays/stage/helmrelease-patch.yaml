apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shop-api
spec:
  values:
    image:
      tag: "latest"
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 192Mi
      limits:
        cpu: 500m
        memory: 384Mi
    ingress:
      hosts:
        - host: app.stage.local
          paths:
            - path: /api
              pathType: Prefix
            - path: /
              pathType: Prefix
      tls:
        - secretName: shop-api-tls
          hosts:
            - app.stage.local
    config:
      DEBUG: "false"
      PGHOST: "shop-postgres-rw.shop-stage.svc.cluster.local"
      REDIS_HOST: "redis-master.shop-stage.svc.cluster.local"
      BETTER_STACK_URL: "https://in.logs.betterstack.com"
