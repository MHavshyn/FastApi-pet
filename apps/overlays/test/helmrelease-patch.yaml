apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shop-api
spec:
  values:
    image:
      tag: "dev"
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    ingress:
      hosts:
        - host: app.test.local
          paths:
            - path: /api
              pathType: Prefix
            - path: /
              pathType: Prefix
      tls:
        - secretName: shop-api-tls
          hosts:
            - app.test.local
    config:
      DEBUG: "true"
      PGHOST: "shop-postgres-rw.shop-test.svc.cluster.local"
      REDIS_HOST: "redis-master.shop-test.svc.cluster.local"
      BETTER_STACK_URL: ""
