apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/controllers
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-configs
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  prune: true
  wait: false
  dependsOn:
    - name: infrastructure-controllers
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/configs-root
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: redis
      namespace: shop-dev
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: redis
      namespace: shop-test
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: redis
      namespace: shop-stage
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: redis
      namespace: shop-prod
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: shop-postgres
      namespace: shop-dev
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: shop-postgres
      namespace: shop-test
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: shop-postgres
      namespace: shop-stage
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: shop-postgres
      namespace: shop-prod
