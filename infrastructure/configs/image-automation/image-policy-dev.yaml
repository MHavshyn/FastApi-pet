apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: shop-api-dev
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: shop-api
  filterTags:
    # Match CI tags like "main-20260522153012-<sha>" → extract the timestamp.
    pattern: '^main-(?P<ts>[0-9]+)-[0-9a-f]+$'
    extract: '$ts'
  policy:
    numerical:
      order: asc
