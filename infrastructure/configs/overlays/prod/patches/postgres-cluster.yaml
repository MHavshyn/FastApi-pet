apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shop-postgres
spec:
  instances: 2
  storage:
    size: 5Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
