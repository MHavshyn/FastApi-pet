apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
spec:
  values:
    master:
      persistence:
        enabled: true
        size: 1Gi
      resources:
        requests:
          cpu: 75m
          memory: 96Mi
        limits:
          cpu: 300m
          memory: 384Mi
